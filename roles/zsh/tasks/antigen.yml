
- name: Install antigen
  https://raw.githubusercontent.com/zsh-users/antigen/master/antigen.zsh
  dest: "{{ '~/.antigen/antigen.zsh' | expanduser }}"

- name: Link antigenrc file
  file:
    src: "{{ dotfiles_home }}/roles/zsh/files/antigenrc.link"
    dest: "{{ '~/.antigenrc' | expanduser }}"
    state: link
